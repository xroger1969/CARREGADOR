name: Atualizar preços dos combustíveis

on:
  workflow_dispatch:
  schedule:
    - cron: '25 6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Atualizar preços médios DGEG
        run: node scripts/update-fuel-prices.mjs
        env:
          DISTRITO_ID: '15'

      - name: Guardar alteração
        run: |
          if git diff --quiet -- data/precos-combustiveis.json; then
            echo "Sem alterações nos preços."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/precos-combustiveis.json
          git commit -m "Update cached fuel prices"
          git push
